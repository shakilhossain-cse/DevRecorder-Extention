<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DevRecorder — Microphone</title>
  <style>
    body {
      margin: 0; padding: 40px 30px; width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #12132a; color: #e0e0e8; text-align: center;
    }
    .icon { font-size: 36px; margin-bottom: 12px; }
    h2 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 13px; color: #8a8ba8; margin: 0; line-height: 1.4; }
    .status { margin-top: 20px; font-size: 13px; font-weight: 600; }
    .granted { color: #22c55e; }
    .denied { color: #ef4444; }
    .waiting { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="icon">🎙️</div>
  <h2>Microphone Access</h2>
  <p>Please allow microphone access in the browser prompt.</p>
  <div id="status" class="status waiting">Requesting permission...</div>
  <script src="mic-permission.js"></script>
</body>
</html>
